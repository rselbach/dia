name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  linux:
    name: Build Linux Release Artifacts
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            patchelf \
            pkg-config

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Download linuxdeploy tools
        run: |
          mkdir -p "$RUNNER_TEMP/linuxdeploy"
          curl -fsSL \
            -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          curl -fsSL \
            -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy-plugin-gtk" \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x "$RUNNER_TEMP/linuxdeploy/linuxdeploy"
          chmod +x "$RUNNER_TEMP/linuxdeploy/linuxdeploy-plugin-gtk"

      - name: Run tests
        run: go test ./core/... ./theme/... ./syntax/... ./preferences/...

      - name: Build release binary
        run: go build -o dia .

      - name: Package release artifacts
        env:
          LINUXDEPLOY: ${{ runner.temp }}/linuxdeploy/linuxdeploy
        run: |
          export PATH="$RUNNER_TEMP/linuxdeploy:$PATH"
          bash build/package-release.sh \
            --version "${GITHUB_REF_NAME#v}" \
            --binary "dia" \
            --output-dir "dist"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  release:
    name: Publish GitHub Release
    needs:
      - linux
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
