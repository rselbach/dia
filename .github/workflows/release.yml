name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  linux:
    name: Build Linux Release Artifacts
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            patchelf \
            pkg-config

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Download linuxdeploy tools
        run: |
          mkdir -p "$RUNNER_TEMP/linuxdeploy"
          curl -fsSL \
            -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          curl -fsSL \
            -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy-plugin-gtk" \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x "$RUNNER_TEMP/linuxdeploy/linuxdeploy"
          chmod +x "$RUNNER_TEMP/linuxdeploy/linuxdeploy-plugin-gtk"

      - name: Run tests
        run: |
          cargo test --manifest-path syntax/Cargo.toml
          cargo test --manifest-path core/Cargo.toml
          cargo test --manifest-path linux-ui/Cargo.toml

      - name: Build Linux UI release binary
        run: cargo build --release --manifest-path linux-ui/Cargo.toml

      - name: Package Linux release artifacts
        env:
          LINUXDEPLOY: ${{ runner.temp }}/linuxdeploy/linuxdeploy
        run: |
          export PATH="$RUNNER_TEMP/linuxdeploy:$PATH"
          bash build/linux/package-release.sh \
            --version "${GITHUB_REF_NAME#v}" \
            --binary "linux-ui/target/release/dia_linux_ui" \
            --output-dir "dist"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-artifacts
          path: dist/*

  macos:
    name: Build macOS Release Artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Resolve Developer ID identity
        id: signing_identity
        run: |
          SIGN_IDENTITY="$(security find-identity -v -p codesigning | grep 'Developer ID Application' | head -n 1 | sed -E 's/.*"(.*)"/\1/')"
          if [[ -z "$SIGN_IDENTITY" ]]; then
            printf 'failed to find a Developer ID Application identity\n' >&2
            exit 1
          fi
          printf 'sign_identity=%s\n' "$SIGN_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          cargo test --manifest-path syntax/Cargo.toml
          cargo test --manifest-path core/Cargo.toml

      - name: Build and package macOS release artifact
        env:
          SIGN_IDENTITY: ${{ steps.signing_identity.outputs.sign_identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cargo build --release --manifest-path core/Cargo.toml --target aarch64-apple-darwin
          cargo build --release --manifest-path core/Cargo.toml --target x86_64-apple-darwin
          mkdir -p core/target/release
          lipo -create \
            core/target/aarch64-apple-darwin/release/libdia_core.dylib \
            core/target/x86_64-apple-darwin/release/libdia_core.dylib \
            -output core/target/release/libdia_core.dylib
          install_name_tool -id "libdia_core.dylib" core/target/release/libdia_core.dylib
          swift build -c release --package-path macos-ui --arch arm64 --arch x86_64
          bash build/macos/package-release.sh \
            --version "${GITHUB_REF_NAME#v}" \
            --app-binary "$PWD/macos-ui/.build/apple/Products/release/Dia" \
            --sign-identity "$SIGN_IDENTITY" \
            --apple-id "$APPLE_ID" \
            --apple-id-password "$APPLE_ID_PASSWORD" \
            --apple-team-id "$APPLE_TEAM_ID" \
            --output-dir dist

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: dist/*

  release:
    name: Publish GitHub Release
    needs:
      - linux
      - macos
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
